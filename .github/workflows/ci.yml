name: CI

on:
  push:
    branches:
      - "001-network-drive-s3-ingest"
      - "main"
  pull_request:
    branches:
      - "001-network-drive-s3-ingest"
      - "main"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.3.0"
      - name: Run ruff
        run: ruff check ingestion-service/src/ ingestion-service/tests/ ingestion-service/lambda/

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: ingestion-service
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run unit tests with coverage
        working-directory: ingestion-service
        run: >
          pytest tests/unit -v
          --cov=src
          --cov-report=xml
          --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: ingestion-service/coverage.xml

  bdd-tests:
    name: BDD Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: ingestion-service
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run BDD tests
        working-directory: ingestion-service
        run: pytest tests/bdd -v
