[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--strict-markers"
markers = [
    "bdd: marks BDD tests",
]
python_files = ["test_*.py", "step_defs.py", "*_step_defs.py"]
bdd_features_base_dir = "tests/bdd"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "G", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E501"]
